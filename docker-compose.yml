name: pinion

services:

  # ── Pinion API ──────────────────────────────────────────────────────────────
  pinion-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      RUST_LOG: "pinion=debug,info"
      PINION_DATABASE_URL: "postgres://pinion:pinion@postgres:5432/pinion"
      PINION_REDIS_URL: "redis://redis:6379"
      PINION_JWT_SECRET: "${PINION_JWT_SECRET:-super-secret-local-dev-key}"
      PINION_LISTEN_ADDR: "0.0.0.0:3000"
      PINION_DAEMON_TOKEN: "secret-daemon-token-12345"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend (Production) ──────────────────────────────────────────────────
  pinion-frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - internal

  # ── Wings Daemon ────────────────────────────────────────────────────────────
  pinion-wings:
    image: ghcr.io/pterodactyl/wings:latest
    restart: always
    networks:
      - internal
    ports:
      - "8080:8080"
      - "2022:2022"
    tty: true
    environment:
      TZ: "UTC"
      WINGS_UID: 988
      WINGS_GID: 988
      WINGS_USERNAME: pterodactyl
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./data/wings/lib:/var/lib/pterodactyl"
      - "./data/wings/etc:/etc/pterodactyl"
      - "./data/wings/tmp:/tmp/pterodactyl"
      - "/run/pterodactyl:/run/pterodactyl"

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pinion
      POSTGRES_USER:     pinion
      POSTGRES_PASSWORD: pinion
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinion"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - internal

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
